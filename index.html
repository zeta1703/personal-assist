<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="49天挑战" />
  <title>49天习惯挑战</title>
  <script>
    // Load html2canvas gracefully — only works when hosted (e.g. GitHub Pages)
    // Falls back silently in restricted environments like Claude's preview
    (function() {
      var s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onerror = function() { window._html2canvasFailed = true; };
      document.head.appendChild(s);
    })();
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: #0D0D0F;
      font-family: -apple-system, 'PingFang SC', 'SF Pro Display', sans-serif;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      color: #F5F5F0;
      overflow-x: hidden;
    }
    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: #111114;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }
    /* Status bar spacer */
    .status-bar { height: env(safe-area-inset-top, 44px); background: #111114; }

    /* Header */
    .header { padding: 16px 20px 0; }
    .header-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .header-label { font-size: 12px; color: rgba(245,245,240,0.4); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; }
    .header-title { font-size: 26px; font-weight: 700; color: #F5F5F0; margin-top: 2px; letter-spacing: -0.03em; }

    /* Progress ring */
    .ring-wrap { position: relative; width: 56px; height: 56px; flex-shrink: 0; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #F5F5F0; }

    /* Today banner */
    .today-banner {
      margin: 14px 20px 0;
      border-radius: 16px;
      padding: 12px 14px;
      display: flex; align-items: center; justify-content: space-between;
      border: 1px solid rgba(255,255,255,0.07);
      background: #1e1e22;
      transition: background 0.4s;
    }
    .today-banner.all-done { background: linear-gradient(135deg, #10B981, #059669); border: none; }
    .today-sub { font-size: 11px; color: rgba(245,245,240,0.4); font-weight: 500; }
    .today-banner.all-done .today-sub { color: rgba(255,255,255,0.7); }
    .today-main { font-size: 14px; font-weight: 700; margin-top: 2px; }
    .today-icons { display: flex; gap: 4px; }
    .today-icon {
      width: 28px; height: 28px; border-radius: 10px;
      background: rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: all 0.2s;
    }
    .today-icon.done { transform: scale(1.1); }

    /* Tabs */
    .tabs { display: flex; padding: 14px 20px 8px; gap: 8px; }
    .tab {
      flex: 1; padding: 8px 0;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; cursor: pointer;
      font-size: 13px; font-weight: 600;
      color: rgba(245,245,240,0.4);
      transition: all 0.2s; font-family: inherit;
    }
    .tab.active { background: rgba(249,115,22,0.15); border-color: rgba(249,115,22,0.3); color: #F97316; }

    /* Content */
    .content { flex: 1; padding: 4px 16px 8px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    /* Habit row */
    .habit-row {
      background: rgba(255,255,255,0.04);
      border-radius: 18px; padding: 14px 14px;
      margin-bottom: 10px;
      border: 1px solid rgba(255,255,255,0.07);
    }
    .habit-header { display: flex; align-items: center; margin-bottom: 12px; }
    .habit-icon-box {
      width: 36px; height: 36px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; margin-right: 10px; flex-shrink: 0;
    }
    .habit-name { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
    .habit-streak { font-size: 11px; color: rgba(245,245,240,0.4); margin-top: 1px; }
    .habit-count { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }

    /* Day grid */
    .day-grid { display: flex; gap: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
    .day-grid::-webkit-scrollbar { display: none; }
    .day-btn {
      width: 28px; height: 28px; min-width: 28px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: rgba(255,255,255,0.3);
      font-weight: 700; transition: all 0.15s ease;
      font-family: inherit;
    }
    .day-btn.is-today { transform: scale(1.08); }
    .day-btn.done { color: #fff; border: none; }

    /* Stats */
    .stat-row {
      background: rgba(255,255,255,0.04);
      border-radius: 18px; padding: 14px;
      margin-bottom: 10px;
      border: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; gap: 14px;
    }
    .stat-name { font-size: 14px; font-weight: 600; }
    .stat-sub { font-size: 12px; color: rgba(245,245,240,0.45); margin-top: 2px; }
    .progress-bar-bg { margin-top: 8px; height: 4px; background: rgba(255,255,255,0.08); border-radius: 4px; }
    .progress-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .stat-pct { font-size: 17px; font-weight: 800; }

    /* Summary */
    .summary-box {
      background: linear-gradient(135deg, #1a1018, #130d1e);
      border: 1px solid rgba(139,92,246,0.2);
      border-radius: 18px; padding: 14px; margin-top: 4px;
    }
    .summary-label { font-size: 11px; color: rgba(245,245,240,0.4); font-weight: 500; margin-bottom: 8px; }
    .summary-row { display: flex; justify-content: space-around; }
    .summary-item { text-align: center; }
    .summary-val { font-size: 22px; font-weight: 800; }
    .summary-sub { font-size: 10px; color: rgba(245,245,240,0.35); font-weight: 500; margin-top: 2px; }

    /* Generate button */
    .gen-btn-wrap { padding: 0 16px 8px; }
    .gen-btn {
      width: 100%; padding: 15px 0;
      background: linear-gradient(135deg, #F97316, #EF4444);
      border: none; border-radius: 18px;
      font-size: 15px; font-weight: 700; color: #fff;
      cursor: pointer; letter-spacing: -0.01em;
      box-shadow: 0 4px 20px rgba(249,115,22,0.4);
      font-family: inherit;
    }
    .backup-wrap { display: flex; gap: 8px; padding: 0 16px 12px; }
    .backup-btn {
      flex: 1; padding: 11px 0;
      border-radius: 14px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .export-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: rgba(245,245,240,0.7); }
    .import-btn { background: rgba(139,92,246,0.12); border: 1px solid rgba(139,92,246,0.25); color: #A78BFA; }
    .toast {
      position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
      background: #2a2a2e; border: 1px solid rgba(255,255,255,0.12);
      color: #F5F5F0; padding: 10px 22px; border-radius: 20px;
      font-size: 13px; font-weight: 600; z-index: 200;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    /* Screenshot button */
    .screenshot-btn {
      width: 100%; padding: 11px 0; margin-top: 0;
      border-radius: 14px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.25);
      color: #34D399;
    }
    .screenshot-wrap { padding: 0 16px 8px; }
    /* Modal download btn */
    .modal-dl-btn {
      width: 100%; margin-top: 10px; padding: 12px 0;
      background: linear-gradient(135deg, #F97316, #EF4444);
      border: none; border-radius: 14px;
      font-size: 13px; font-weight: 700; color: #fff;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 4px 16px rgba(249,115,22,0.35);
    }

    /* Home indicator */
    .home-ind { display: flex; justify-content: center; padding-bottom: 8px; }
    .home-bar { width: 134px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 3px; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }
    .modal-card {
      width: 100%; max-width: 340px;
      background: linear-gradient(145deg, #1a1020 0%, #0f1520 50%, #0d1a10 100%);
      border-radius: 28px; padding: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
      position: relative; overflow: hidden;
    }
    .orb1 { position: absolute; top: -40px; right: -40px; width: 160px; height: 160px; border-radius: 50%; background: radial-gradient(circle, rgba(249,115,22,0.15), transparent 70%); pointer-events: none; }
    .orb2 { position: absolute; bottom: -60px; left: -30px; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(139,92,246,0.1), transparent 70%); pointer-events: none; }
    .modal-inner { position: relative; }
    .modal-badge { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(249,115,22,0.7); font-weight: 600; text-align: center; }
    .modal-title { font-size: 24px; font-weight: 800; text-align: center; margin-top: 4px; letter-spacing: -0.03em; }
    .modal-day { font-size: 12px; color: rgba(245,245,240,0.35); text-align: center; margin-top: 4px; margin-bottom: 18px; }
    .modal-habits { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
    .modal-habit-row { }
    .modal-habit-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .modal-habit-name { font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
    .modal-habit-count { font-size: 12px; font-weight: 700; }
    .modal-bar-bg { height: 6px; background: rgba(255,255,255,0.07); border-radius: 6px; }
    .modal-bar-fill { height: 100%; border-radius: 6px; transition: width 0.5s; }
    .dot-grid { background: rgba(255,255,255,0.04); border-radius: 14px; padding: 12px; border: 1px solid rgba(255,255,255,0.06); margin-bottom: 16px; }
    .dot-label { font-size: 9px; color: rgba(245,245,240,0.35); margin-bottom: 7px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
    .dot-wrap { display: flex; flex-wrap: wrap; gap: 3px; }
    .dot { width: 8px; height: 8px; border-radius: 3px; background: rgba(255,255,255,0.08); }
    .modal-motto { text-align: center; font-size: 11px; color: rgba(245,245,240,0.25); }
    .close-btn {
      width: 100%; margin-top: 16px; padding: 12px 0;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; font-size: 13px; font-weight: 600; color: rgba(245,245,240,0.6);
      cursor: pointer; font-family: inherit;
    }
  </style>
</head>
<body>
<div class="app" id="app">
  <div class="status-bar"></div>

  <!-- Header -->
  <div class="header">
    <div class="header-row">
      <div>
        <div class="header-label">49天挑战</div>
        <div class="header-title">每日习惯</div>
      </div>
      <div class="ring-wrap">
        <svg width="56" height="56">
          <circle cx="28" cy="28" r="23" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>
          <circle cx="28" cy="28" r="23" fill="none" stroke="#F97316" stroke-width="4"
            stroke-dasharray="0 145" stroke-linecap="round" id="overall-ring" style="transition:stroke-dasharray 0.5s"/>
        </svg>
        <div class="ring-label" id="overall-pct">0%</div>
      </div>
    </div>

    <!-- Today banner -->
    <div class="today-banner" id="today-banner">
      <div>
        <div class="today-sub" id="today-sub">今天 · 第1天</div>
        <div class="today-main" id="today-main">0/4 个习惯已完成</div>
      </div>
      <div class="today-icons" id="today-icons"></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-tracker" onclick="switchTab('tracker')">打卡记录</button>
    <button class="tab" id="tab-stats" onclick="switchTab('stats')">数据统计</button>
  </div>

  <!-- Content -->
  <div class="content" id="content"></div>

  <!-- Generate button -->
  <div class="gen-btn-wrap">
    <button class="gen-btn" onclick="showCard()">✨ 生成挑战卡片</button>
  </div>
  <!-- Screenshot button -->
  <div class="screenshot-wrap">
    <button class="screenshot-btn" onclick="screenshotApp()">📸 保存截图 · 分享到社交媒体</button>
  </div>
  <!-- Backup buttons -->
  <div class="backup-wrap">
    <button class="backup-btn export-btn" onclick="exportData()">📤 备份进度</button>
    <button class="backup-btn import-btn" onclick="document.getElementById('import-input').click()">📥 恢复进度</button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
  </div>

  <div class="home-ind"><div class="home-bar"></div></div>
</div>

<!-- Modal -->
<div id="toast" class="toast"></div>
<div class="modal-overlay" id="modal" style="display:none" onclick="hideCard()">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="orb1"></div><div class="orb2"></div>
    <div class="modal-inner">
      <div class="modal-badge">49天挑战</div>
      <div class="modal-title">习惯打卡</div>
      <div class="modal-day" id="modal-day"></div>
      <div class="modal-habits" id="modal-habits"></div>
      <div class="dot-grid">
        <div class="dot-label">全部习惯 · 49天</div>
        <div class="dot-wrap" id="modal-dots"></div>
      </div>
      <div class="modal-motto">坚持下去 · 你正在创造美好的改变 🌱</div>
      <button class="close-btn" onclick="hideCard()">关闭</button>
      <button class="modal-dl-btn" onclick="screenshotCard()">📸 下载挑战卡片</button>
    </div>
  </div>
</div>

<script>
const HABITS = [
  { id: "morning-meditation", label: "晨间冥想", icon: "🌅", color: "#F97316" },
  { id: "night-meditation",   label: "夜间冥想", icon: "🌙", color: "#8B5CF6" },
  { id: "yoga",               label: "瑜伽",     icon: "🧘", color: "#10B981" },
  { id: "workout",            label: "健身锻炼", icon: "💪", color: "#EF4444" },
];
const TOTAL_DAYS = 49;
const CHALLENGE_START = new Date("2026-04-27T00:00:00");

function getTodayIndex() {
  return Math.min(Math.max(0, Math.floor((Date.now() - CHALLENGE_START.getTime()) / 86400000)), TOTAL_DAYS - 1);
}

// Load/save state
function loadState() {
  try {
    const saved = localStorage.getItem("habit49");
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return HABITS.reduce((acc, h) => ({ ...acc, [h.id]: Array(TOTAL_DAYS).fill(false) }), {});
}
function saveState() {
  localStorage.setItem("habit49", JSON.stringify(state));
}

let state = loadState();
let activeTab = "tracker";
const todayIndex = getTodayIndex();

function getStreak(days) {
  let s = 0;
  for (let i = TOTAL_DAYS - 1; i >= 0; i--) {
    if (days[i]) s++; else break;
  }
  return s;
}

function toggleDay(habitId, dayIdx) {
  state[habitId][dayIdx] = !state[habitId][dayIdx];
  saveState();
  render();
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById("tab-tracker").className = "tab" + (tab === "tracker" ? " active" : "");
  document.getElementById("tab-stats").className = "tab" + (tab === "stats" ? " active" : "");
  renderContent();
}

function hex2rgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function renderTracker() {
  return HABITS.map(habit => {
    const days = state[habit.id];
    const streak = getStreak(days);
    const completed = days.filter(Boolean).length;
    const streakTxt = streak > 0 ? `🔥 连续 ${streak} 天` : "今天开始你的连续记录";

    const btns = Array.from({length: TOTAL_DAYS}, (_, i) => {
      const isToday = i === todayIndex;
      const done = days[i];
      let bg = done ? habit.color : isToday ? hex2rgba(habit.color, 0.13) : "rgba(255,255,255,0.04)";
      let border = isToday ? `1.5px solid ${habit.color}` : done ? "none" : "1px solid rgba(255,255,255,0.1)";
      let transform = isToday ? "scale(1.08)" : "scale(1)";
      let shadow = done ? `0 2px 8px ${hex2rgba(habit.color, 0.33)}` : "none";
      return `<button class="day-btn${isToday?' is-today':''}${done?' done':''}"
        style="background:${bg};border:${border};transform:${transform};box-shadow:${shadow};color:${done?'#fff':'rgba(255,255,255,0.3)'}"
        onclick="toggleDay('${habit.id}',${i})">${done ? "✓" : ""}</button>`;
    }).join("");

    return `<div class="habit-row">
      <div class="habit-header">
        <div class="habit-icon-box" style="background:${hex2rgba(habit.color,0.13)}">${habit.icon}</div>
        <div style="flex:1">
          <div class="habit-name">${habit.label}</div>
          <div class="habit-streak">${streakTxt}</div>
        </div>
        <div class="habit-count" style="color:${habit.color};background:${hex2rgba(habit.color,0.1)}">${completed}/${TOTAL_DAYS}</div>
      </div>
      <div class="day-grid">${btns}</div>
    </div>`;
  }).join("");
}

function renderStats() {
  const totalPossible = HABITS.length * TOTAL_DAYS;
  const totalDone = HABITS.reduce((s,h) => s + state[h.id].filter(Boolean).length, 0);
  const overallPct = Math.round(totalDone / totalPossible * 100);

  const rows = HABITS.map(habit => {
    const days = state[habit.id];
    const done = days.filter(Boolean).length;
    const streak = getStreak(days);
    const pct = done / TOTAL_DAYS * 100;
    const circ = 2 * Math.PI * 22;
    const dash = circ * done / TOTAL_DAYS;
    return `<div class="stat-row">
      <div style="position:relative;width:52px;height:52px;flex-shrink:0">
        <svg width="52" height="52" style="transform:rotate(-90deg)">
          <circle cx="26" cy="26" r="22" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>
          <circle cx="26" cy="26" r="22" fill="none" stroke="${habit.color}" stroke-width="4"
            stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px">${habit.icon}</div>
      </div>
      <div style="flex:1">
        <div class="stat-name">${habit.label}</div>
        <div class="stat-sub">已完成 ${done} 天 · 连续 ${streak} 天</div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" style="width:${pct}%;background:${habit.color};box-shadow:0 0 8px ${hex2rgba(habit.color,0.53)}"></div>
        </div>
      </div>
      <div class="stat-pct" style="color:${habit.color}">${Math.round(pct)}%</div>
    </div>`;
  }).join("");

  const summary = `<div class="summary-box">
    <div class="summary-label">总体进度</div>
    <div class="summary-row">
      <div class="summary-item"><div class="summary-val">${totalDone}</div><div class="summary-sub">已完成</div></div>
      <div class="summary-item"><div class="summary-val">${totalPossible - totalDone}</div><div class="summary-sub">剩余</div></div>
      <div class="summary-item"><div class="summary-val">${overallPct}%</div><div class="summary-sub">完成率</div></div>
    </div>
  </div>`;

  return rows + summary;
}

function renderContent() {
  document.getElementById("content").innerHTML = activeTab === "tracker" ? renderTracker() : renderStats();
}

function renderHeader() {
  const totalPossible = HABITS.length * TOTAL_DAYS;
  const totalDone = HABITS.reduce((s,h) => s + state[h.id].filter(Boolean).length, 0);
  const pct = totalDone / totalPossible;
  const circ = 2 * Math.PI * 23;
  const dash = circ * pct;

  document.getElementById("overall-ring").setAttribute("stroke-dasharray", `${dash} ${circ}`);
  document.getElementById("overall-pct").textContent = Math.round(pct * 100) + "%";

  const todayDone = HABITS.filter(h => state[h.id][todayIndex]).length;
  const allDone = todayDone === HABITS.length;

  document.getElementById("today-sub").textContent = `今天 · 第 ${todayIndex + 1} 天`;
  document.getElementById("today-main").textContent = allDone ? "今日习惯全部完成！🎉" : `${todayDone}/${HABITS.length} 个习惯已完成`;

  const banner = document.getElementById("today-banner");
  banner.className = "today-banner" + (allDone ? " all-done" : "");

  document.getElementById("today-icons").innerHTML = HABITS.map(h => {
    const done = state[h.id][todayIndex];
    return `<div class="today-icon${done?' done':''}" style="background:${done ? h.color : 'rgba(255,255,255,0.07)'}">${h.icon}</div>`;
  }).join("");
}

function render() {
  renderHeader();
  renderContent();
}

function showCard() {
  const totalDone = HABITS.reduce((s,h) => s + state[h.id].filter(Boolean).length, 0);
  const totalPossible = HABITS.length * TOTAL_DAYS;
  const pct = Math.round(totalDone / totalPossible * 100);

  document.getElementById("modal-day").textContent = `第 ${todayIndex + 1} 天 / 共49天 · 完成 ${pct}%`;

  document.getElementById("modal-habits").innerHTML = HABITS.map(habit => {
    const done = state[habit.id].filter(Boolean).length;
    const p = done / TOTAL_DAYS * 100;
    return `<div class="modal-habit-row">
      <div class="modal-habit-top">
        <div class="modal-habit-name">${habit.icon} ${habit.label}</div>
        <div class="modal-habit-count" style="color:${habit.color}">${done}/49</div>
      </div>
      <div class="modal-bar-bg">
        <div class="modal-bar-fill" style="width:${p}%;background:linear-gradient(90deg,${habit.color}cc,${habit.color});box-shadow:0 0 8px ${hex2rgba(habit.color,0.4)}"></div>
      </div>
    </div>`;
  }).join("");

  document.getElementById("modal-dots").innerHTML = Array.from({length: TOTAL_DAYS}, (_,i) => {
    const allDone = HABITS.every(h => state[h.id][i]);
    const someDone = HABITS.some(h => state[h.id][i]);
    const isToday = i === todayIndex;
    let bg = allDone ? "#F97316" : someDone ? "rgba(249,115,22,0.4)" : "rgba(255,255,255,0.08)";
    let border = isToday ? "1px solid #F97316" : "none";
    let shadow = allDone ? "0 0 4px rgba(249,115,22,0.5)" : "none";
    return `<div class="dot" style="background:${bg};border:${border};box-shadow:${shadow}"></div>`;
  }).join("");

  document.getElementById("modal").style.display = "flex";
}

function hideCard() {
  document.getElementById("modal").style.display = "none";
}

function exportData() {
  const backup = {
    version: 1,
    exportedAt: new Date().toISOString(),
    challengeStart: "2026-04-27",
    state: state
  };
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `习惯打卡备份_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast("✅ 备份已保存！");
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup.state) throw new Error("格式错误");
      // Validate all habit keys exist
      const valid = HABITS.every(h => Array.isArray(backup.state[h.id]));
      if (!valid) throw new Error("数据不匹配");
      state = backup.state;
      saveState();
      render();
      showToast("✅ 进度已恢复！");
    } catch(err) {
      showToast("❌ 文件格式错误");
    }
    event.target.value = ""; // reset so same file can be re-imported
  };
  reader.readAsText(file);
}

async function screenshotApp() {
  if (typeof html2canvas === 'undefined') {
    showToast("📸 截图功能需在 GitHub 上使用");
    return;
  }
  showToast("⏳ 正在生成截图...");
  const el = document.getElementById("app");
  try {
    const canvas = await html2canvas(el, {
      backgroundColor: "#111114",
      scale: 2,
      useCORS: true,
      scrollY: 0,
      windowWidth: el.scrollWidth,
      windowHeight: el.scrollHeight,
    });
    const date = new Date().toISOString().slice(0,10);
    downloadCanvas(canvas, `习惯打卡_${date}.png`);
    showToast("✅ 截图已保存！");
  } catch(e) {
    showToast("❌ 截图失败，请重试");
  }
}

async function screenshotCard() {
  if (typeof html2canvas === 'undefined') {
    showToast("📸 截图功能需在 GitHub 上使用");
    return;
  }
  showToast("⏳ 正在生成卡片...");
  const el = document.querySelector(".modal-card");
  try {
    const canvas = await html2canvas(el, {
      backgroundColor: "#1a1020",
      scale: 3,
      useCORS: true,
    });
    const date = new Date().toISOString().slice(0,10);
    downloadCanvas(canvas, `挑战卡片_${date}.png`);
    showToast("✅ 卡片已保存！");
  } catch(e) {
    showToast("❌ 截图失败，请重试");
  }
}

function downloadCanvas(canvas, filename) {
  // On iPhone Safari, open in new tab so user can long-press to save
  const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
  const isMobile = /iPhone|iPad|iPod/i.test(navigator.userAgent);
  if (isSafari && isMobile) {
    const win = window.open();
    win.document.write(`<img src="${canvas.toDataURL('image/png')}" style="max-width:100%;display:block;margin:auto">`);
    win.document.title = filename;
    showToast("长按图片 → 存储到相册 📷");
  } else {
    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    a.download = filename;
    a.click();
  }
}


function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// Init
render();
</script>
